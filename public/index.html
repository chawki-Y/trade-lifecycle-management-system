<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Processing System</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Fintech Operations</p>
        <h1>Trade Processing System</h1>
      </div>
      <button id="refreshButton" class="secondary-button" type="button">Refresh</button>
    </header>

    <main class="layout">
      <section class="summary" aria-label="Trade summary">
        <article class="metric">
          <span>Total Trades</span>
          <strong id="totalTrades">0</strong>
        </article>
        <article class="metric">
          <span>Valid</span>
          <strong id="validTrades">0</strong>
        </article>
        <article class="metric">
          <span>Rejected</span>
          <strong id="rejectedTrades">0</strong>
        </article>
        <article class="metric">
          <span>Total P&L</span>
          <strong id="totalPnl">0.0000</strong>
        </article>
      </section>

      <section class="panel form-panel">
        <div class="section-heading">
          <h2>Capture Trade</h2>
          <p id="formMessage" role="status"></p>
        </div>

        <form id="tradeForm">
          <label>
            Trade ID
            <input id="tradeId" name="tradeId" type="text" placeholder="TRD-1005" required />
          </label>

          <label>
            Instrument
            <input id="instrument" name="instrument" type="text" placeholder="AAPL" required />
          </label>

          <label>
            Trade Type
            <select id="tradeType" name="tradeType" required>
              <option value="BUY">BUY</option>
              <option value="SELL">SELL</option>
            </select>
          </label>

          <label>
            Quantity
            <input id="quantity" name="quantity" type="number" min="0.01" step="0.01" placeholder="100" required />
          </label>

          <label>
            Trade Price
            <input id="tradePrice" name="tradePrice" type="number" min="0.0001" step="0.0001" placeholder="180.25" required />
          </label>

          <label>
            Market Price
            <input id="marketPrice" name="marketPrice" type="number" min="0.0001" step="0.0001" placeholder="184.10" required />
          </label>

          <label>
            Trade Date
            <input id="tradeDate" name="tradeDate" type="date" required />
          </label>

          <button class="primary-button" type="submit">Submit Trade</button>
        </form>
      </section>

      <section class="panel trades-panel">
        <div class="section-heading">
          <h2>Latest Trades</h2>
          <span id="tradeCount">0 rows</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Trade ID</th>
                <th>Instrument</th>
                <th>Type</th>
                <th>Qty</th>
                <th>Trade Price</th>
                <th>Market Price</th>
                <th>P&L</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tradesTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
